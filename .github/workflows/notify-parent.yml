name: Notificar repositório principal

on:
  push:
    branches: [main]

  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify-parent:
    runs-on: ubuntu-latest

    steps:
      - name: Disparar atualização dos submodules no repo principal
        env:
          GH_TOKEN: ${{ secrets.PARENT_REPO_TOKEN }}
          TARGET_REPO: m-germano/delivery-system
          EVENT_TYPE: update-submodules
        run: |
          payload=$(jq -n \
            --arg event_type "$EVENT_TYPE" \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg sha "$GITHUB_SHA" \
            --arg ref "$GITHUB_REF_NAME" \
            '{event_type: $event_type, client_payload: {source_repo: $repo, sha: $sha, ref: $ref}}')

          curl --fail-with-body -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$TARGET_REPO/dispatches" \
            -d "$payload"